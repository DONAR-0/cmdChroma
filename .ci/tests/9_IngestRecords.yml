version: "2"
name: Test Chroma CLI - Ingestion Records

vars:
  cmdChroma: cmdChroma
  collection: test_Valid
  test_file: test_data.jsonl
  basic_file: basic_data.jsonl
  hf_stlye_file: hf_mock.jsonl
  limit_count: 5

testcases:
  - name: validation_checks
    steps:
      - type: exec
        script: {{.cmdChroma}} ingest
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "collection name is not provided"

      - type: exec
        script: {{.cmdChroma}} ingest {{.collection}}
        assertions:
          - result.code ShouldEqual 1
          - result.systemout ShouldContainSubstring "filepath is not provided"

  - name: setup_test_data
    steps:
      - type: exec
        script: {{.cmdChroma}} create {{.collection}}
        assertions:
          - result.code ShouldEqual 0

      - type: exec
        script: |
          rm -f {{.test_file}}
          for i in $(seq 1 10); do
            echo "{\"id\": \"test-$i\", \"text\": \"Document $i content\"}" >> {{.test_file}}
          done
        assertions:
          - result.code ShouldEqual 0

  - name: run_ingest_with_limit
    steps:
      - type: exec
        script: {{.cmdChroma}} ingest {{.collection}} {{.test_file}} --n-ingest {{.limit_count}}
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Limit reached"

  - name: test_generic_mapping_and_metadata
    steps:
      # Step 1: Create a mock Hugging Face style file (Nested and custom keys)
      - type: exec
        script: |
          echo '{"instruction": "Write a Go function", "output": "func main() {}", "author": "Odin"}' > {{.hf_style_file}}
          echo '{"instruction": "Explain RAG", "output": "Retrieval Augmented...", "author": "Chroma"}' >> {{.hf_style_file}}
        assertions:
          - result.code ShouldEqual 0

      # Step 2: Ingest using the NEW flags you added
      - type: exec
        script: |
          {{.cmdChroma}} ingest {{.collection}} {{.hf_style_file}} \
            --field-content "instruction" \
            --all-metadata \
            --batch-size 1
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Ingestion successful"

      # Step 3: Verify the metadata and content mapping via list-docs
      - type: exec
        script: {{.cmdChroma}} rs {{.collection}}
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldContainSubstring "Write a Go function"
          - result.systemout ShouldContainSubstring "author"
          - result.systemout ShouldContainSubstring "Odin"
          - result.systemout ShouldContainSubstring "output"
          - result.systemout ShouldContainSubstring "func main() {}"

  - name: cleanup
    always: true
    steps:
      - type: exec
        script: rm -f {{.test_file}}
